* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; color: #c8c8d0; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
:root {
  --background: #0a0a0f; --surface: #12121a; --surface2: #1a1a25;
  --border: #252530; --text: #c8c8d0; --text-dim: #6b6b78; --text-bright: #f0f0f5;
  --accent: #4ecdc4; --red: #ff6b6b; --green: #51cf66; --orange: #ffa94d;
  --blue: #74b9ff; --yellow: #ffd43b;
}
@media (prefers-color-scheme: light) {
  :root {
    --background: #f5f5f0; --surface: #ffffff; --surface2: #f0f0eb;
    --border: #ddd; --text: #333; --text-dim: #888; --text-bright: #111;
    --accent: #0891b2; --red: #dc2626; --green: #16a34a;
    --orange: #d97706; --blue: #2563eb; --yellow: #854d0e;
  }
  body { background: var(--background); color: var(--text); }
}
.pill { 
  padding: 4px 12px; border-radius: 4px; cursor: pointer; 
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text-dim); font-size: 11px; font-family: inherit;
  transition: all 0.15s;
}
.pill.active { background: var(--accent); color: #0a0a0f; border-color: var(--accent); font-weight: 600; }
.pill:hover:not(.active) { border-color: var(--text-dim); color: var(--text); }
.tbl { width: 100%; border-collapse: collapse; }
.tbl th, .tbl td { padding: 5px 8px; text-align: right; white-space: nowrap; border-bottom: 1px solid var(--border); }
.tbl th { color: var(--text-dim); font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; background: var(--surface); z-index: 2; }
.tbl td:first-child, .tbl th:first-child { text-align: left; position: sticky; left: 0; background: var(--surface); z-index: 1; min-width: 200px; }
.tbl th:first-child { z-index: 3; }
.row-revenue td { color: var(--accent); font-weight: 600; }
.row-subtotal td { color: var(--text-bright); font-weight: 600; border-top: 2px solid var(--border); }
.row-total td { color: var(--yellow); font-weight: 700; border-top: 2px double var(--text-dim); border-bottom: 2px double var(--text-dim); }
.row-detail td { color: var(--text-dim); font-size: 11px; }
.row-detail td:first-child { padding-left: 16px; }
.row-cost td { color: var(--text); }
.ecart-pos { color: var(--green) !important; }
.ecart-neg { color: var(--red) !important; }
.ecart-zero { color: var(--text-dim) !important; }
.col-sep { border-left: 2px solid var(--accent) !important; }
.month-slider { 
  -webkit-appearance: none; width: 100%; height: 4px; 
  background: var(--border); border-radius: 2px; outline: none; flex: 1;
}
.month-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px;
  background: var(--accent); border-radius: 50%; cursor: pointer;
}
</style>
</head>

const fmt = (v) => {
  if (v === 0 || v === null || v === undefined) return "-";
  const abs = Math.abs(Math.round(v));
  const s = abs.toLocaleString("fr-FR");
  return v < 0 ? "(" + s + ")" : s;
};
const fmtK = (v) => {
  if (v === 0 || v === null || v === undefined) return "-";
  const abs = Math.abs(Math.round(v / 1000));
  const s = abs.toLocaleString("fr-FR");
  return v < 0 ? "(" + s + ")" : s;
};
const fmtPct = (v) => {
  if (v === null || v === undefined || !isFinite(v)) return "-";
  const abs = Math.abs(v * 100);
  const s = abs.toFixed(1) + "%";
  return v < 0 ? "(" + s + ")" : s;
};
const computeCumul = (values, upToMonth) => values.slice(0, upToMonth + 1).reduce((a, b) => a + b, 0);

function App() {
  const [viewMode, setViewMode] = useState("cumul");
  const [selectedMonth, setSelectedMonth] = useState(4);
  const [showDetail, setShowDetail] = useState(false);
  const [displayUnit, setDisplayUnit] = useState("€");
  const formatter = displayUnit === "K€" ? fmtK : fmt;

  const getVal = (dataset, rowIdx, monthIdx) => {
    const row = RAW[dataset]?.rows[rowIdx];
    if (!row) return 0;
    if (viewMode === "cumul") return computeCumul(row.values, monthIdx);
    if (viewMode === "total") return row.values[12];
    return row.values[monthIdx];
  };

  const rows = RAW["N-1"].rows;
  const visibleRows = useMemo(() => {
    if (showDetail) return rows.map((_, i) => i);
    return rows.map((r, i) => ({ ...r, i })).filter(r => r.cat !== "detail").map(r => r.i);
  }, [showDetail]);

  const activeMonth = viewMode === "total" ? 12 : selectedMonth;

  return (
    <div style={{ padding: 20, maxWidth: 1400, margin: "0 auto" }}>
      <div style={{ marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
        <div>
          <h1 style={{ fontSize: 18, fontWeight: 700, color: "var(--text-bright)", letterSpacing: "-0.5px" }}>SAUVAGEONNE MÉGÈVE</h1>
          <p style={{ color: "var(--text-dim)", fontSize: 11, marginTop: 2 }}>Compte de résultat comparatif — N-1 retraité / N / Budget</p>
        </div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          <button className={"pill " + (displayUnit === "€" ? "active" : "")} onClick={() => setDisplayUnit("€")}>€</button>
          <button className={"pill " + (displayUnit === "K€" ? "active" : "")} onClick={() => setDisplayUnit("K€")}>K€</button>
          <span style={{ width: 1, background: "var(--border)", margin: "0 4px" }}/>
          <button className={"pill " + (showDetail ? "active" : "")} onClick={() => setShowDetail(!showDetail)}>
            {showDetail ? "▾ Détail" : "▸ Détail"}
          </button>
        </div>
      </div>

      <div style={{ display: "flex", gap: 6, marginBottom: 12, alignItems: "center", flexWrap: "wrap" }}>
        <button className={"pill " + (viewMode === "cumul" ? "active" : "")} onClick={() => setViewMode("cumul")}>Cumul</button>
        <button className={"pill " + (viewMode === "mensuel" ? "active" : "")} onClick={() => setViewMode("mensuel")}>Mensuel</button>
        <button className={"pill " + (viewMode === "total" ? "active" : "")} onClick={() => setViewMode("total")}>Total exercice</button>
      </div>

      {viewMode !== "total" && (
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16, padding: "8px 12px", background: "var(--surface)", borderRadius: 6, border: "1px solid var(--border)" }}>
          <span style={{ color: "var(--text-dim)", fontSize: 10, minWidth: 60 }}>{viewMode === "cumul" ? "Cumul →" : "Mois :"}</span>
          <input type="range" min={0} max={11} value={selectedMonth} className="month-slider" onChange={(e) => setSelectedMonth(Number(e.target.value))} />
          <span style={{ color: "var(--accent)", fontWeight: 600, minWidth: 30 }}>{MONTHS[selectedMonth]}</span>
        </div>
      )}

      <div style={{ overflow: "auto", borderRadius: 6, border: "1px solid var(--border)", background: "var(--surface)" }}>
        <table className="tbl">
          <thead>
            <tr>
              <th style={{ minWidth: 200 }}>{viewMode === "cumul" ? "Cumul Nov → " + MONTHS[selectedMonth] : viewMode === "mensuel" ? MONTHS[selectedMonth] : "Total exercice"}</th>
              <th>N-1</th><th>N</th><th>Budget</th>
              <th className="col-sep">Δ N vs N-1</th><th>Δ %</th>
              <th className="col-sep">Δ N vs Bdg</th><th>Δ %</th>
            </tr>
          </thead>
          <tbody>
            {visibleRows.map((rowIdx) => {
              const row = rows[rowIdx];
              const vN1 = getVal("N-1", rowIdx, activeMonth);
              const vN = getVal("N", rowIdx, activeMonth);
              const vB = getVal("Budget", rowIdx, activeMonth);
              const dNN1 = vN - vN1;
              const dNB = vN - vB;
              const isPositiveGood = (row.cat === "revenue" || row.cat === "subtotal" || row.cat === "total");
              const getEcartClass = (delta) => {
                if (Math.abs(delta) < 1) return "ecart-zero";
                if (isPositiveGood) return delta > 0 ? "ecart-pos" : "ecart-neg";
                return delta > 0 ? "ecart-neg" : "ecart-pos";
              };
              const pctNN1 = vN1 !== 0 ? dNN1 / Math.abs(vN1) : null;
              const pctNB = vB !== 0 ? dNB / Math.abs(vB) : null;
              return (
                <tr key={rowIdx} className={"row-" + row.cat}>
                  <td>{row.label}</td>
                  <td>{formatter(vN1)}</td><td>{formatter(vN)}</td><td>{formatter(vB)}</td>
                  <td className={"col-sep " + getEcartClass(dNN1)}>{formatter(dNN1)}</td>
                  <td className={getEcartClass(dNN1)}>{fmtPct(pctNN1)}</td>
                  <td className={"col-sep " + getEcartClass(dNB)}>{formatter(dNB)}</td>
                  <td className={getEcartClass(dNB)}>{fmtPct(pctNB)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 10, marginTop: 16 }}>
        {(() => {
          const caN = getVal("N", 0, activeMonth);
          const caN1 = getVal("N-1", 0, activeMonth);
          const mbN = getVal("N", 2, activeMonth);
          const ebitdaN = getVal("N", 20, activeMonth);
          const ebitdaB = getVal("Budget", 20, activeMonth);
          const rnN = getVal("N", rows.length - 1, activeMonth);
          const cards = [
            { title: "CA N", value: formatter(caN), sub: "vs N-1: " + (caN1 !== 0 ? ((caN/caN1-1)*100).toFixed(1)+"%" : "-"), color: "var(--accent)" },
            { title: "Taux MB", value: caN !== 0 ? (mbN/caN*100).toFixed(1)+"%" : "-", sub: "MB = " + formatter(mbN), color: "var(--blue)" },
            { title: "EBITDA N", value: formatter(ebitdaN), sub: "Bdg: " + formatter(ebitdaB), color: ebitdaN >= ebitdaB ? "var(--green)" : "var(--red)" },
            { title: "Résultat net N", value: formatter(rnN), sub: "", color: rnN >= 0 ? "var(--green)" : "var(--red)" },
          ];
          return cards.map((c, i) => (
            <div key={i} style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 6, padding: "12px 14px" }}>
              <div style={{ fontSize: 10, color: "var(--text-dim)", textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 4 }}>{c.title}</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: c.color }}>{c.value}</div>
              {c.sub && <div style={{ fontSize: 10, color: "var(--text-dim)", marginTop: 2 }}>{c.sub}</div>}
            </div>
          ));
        })()}
      </div>

      <div style={{ marginTop: 16, fontSize: 10, color: "var(--text-dim)", textAlign: "center" }}>
        Sauvageonne Mégève — Exercice 11/2025 → 10/2026 • Vert = favorable • Rouge = défavorable • Montants HT en {displayUnit}
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
